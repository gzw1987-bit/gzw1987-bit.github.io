<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhengwen 项目组合 | 量化系统 / AI Agent / 内容产品 / 基础设施</title>
<style>
:root {
  --bg: #f6f4ef;
  --panel: #ffffff;
  --ink: #171717;
  --muted: #64635f;
  --line: #ded9cf;
  --blue: #2457a6;
  --green: #1f7a56;
  --red: #9d3a31;
  --amber: #a36b14;
  --violet: #5a4a99;
  --shadow: 0 18px 48px rgba(40, 36, 28, .08);
}
* { box-sizing: border-box; }
html { background: var(--bg); color: var(--ink); }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  line-height: 1.5;
}
a { color: inherit; }
.shell {
  max-width: 1180px;
  margin: 0 auto;
  padding: 32px 20px 56px;
}
.topbar {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  padding: 14px 0 38px;
  border-bottom: 1px solid var(--line);
}
.brand {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.source {
  color: var(--muted);
  font-size: 13px;
  text-align: right;
}
.hero {
  padding: 54px 0 34px;
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(260px, .7fr);
  gap: 36px;
  align-items: end;
}
.eyebrow {
  color: var(--blue);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
}
h1 {
  margin: 12px 0 16px;
  font-size: clamp(32px, 6vw, 68px);
  line-height: 1.02;
  letter-spacing: 0;
}
.intro {
  max-width: 760px;
  color: var(--muted);
  font-size: 18px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.stat {
  min-height: 94px;
  padding: 16px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.stat strong {
  display: block;
  font-size: 28px;
  line-height: 1;
}
.stat span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
}
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 12px 0 28px;
}
.filter {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--panel);
  padding: 8px 13px;
  color: var(--muted);
  font: inherit;
  font-size: 14px;
  cursor: pointer;
}
.filter[aria-pressed="true"] {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.tier {
  padding: 34px 0 10px;
  border-top: 1px solid var(--line);
}
.tier-head {
  display: grid;
  grid-template-columns: 110px minmax(0, 1fr);
  gap: 22px;
  margin-bottom: 18px;
}
.tier-code {
  font-size: 46px;
  font-weight: 800;
  line-height: 1;
}
.tier h2 {
  margin: 2px 0 6px;
  font-size: 24px;
}
.tier-desc {
  color: var(--muted);
  margin: 0;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
}
.card h3 {
  margin: 0 0 10px;
  font-size: 19px;
  line-height: 1.25;
}
.positioning {
  color: var(--ink);
  margin: 0 0 14px;
  font-size: 14px;
}
.meta {
  display: grid;
  gap: 11px;
  margin-top: auto;
}
.field-label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 3px;
}
.field-value {
  font-size: 13px;
  overflow-wrap: anywhere;
}
.path-link {
  color: var(--blue);
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
.status {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  background: #eef1f6;
  color: #2d435f;
}
.tier[data-tier="S"] .tier-code { color: var(--red); }
.tier[data-tier="A"] .tier-code { color: var(--blue); }
.tier[data-tier="B"] .tier-code { color: var(--green); }
.tier[data-tier="C"] .tier-code { color: var(--amber); }
.tier[data-tier="D"] .tier-code { color: var(--violet); }
.empty {
  color: var(--muted);
  padding: 40px 0;
}
.footer {
  color: var(--muted);
  font-size: 13px;
  padding-top: 38px;
}
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; }
  .stats { max-width: 520px; }
  .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 640px) {
  .shell { padding: 22px 14px 38px; }
  .topbar { align-items: flex-start; flex-direction: column; padding-bottom: 24px; }
  .source { text-align: left; }
  .hero { padding-top: 34px; }
  .intro { font-size: 16px; }
  .stats { grid-template-columns: 1fr; }
  .tier-head { grid-template-columns: 1fr; gap: 8px; }
  .tier-code { font-size: 38px; }
  .grid { grid-template-columns: 1fr; }
  .card { min-height: auto; }
}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand">Zhengwen Portfolio</div>
    <div class="source">数据源：2026-06-11 Codex 额度消耗项目作战计划</div>
  </header>

  <section class="hero" aria-labelledby="page-title">
    <div>
      <div class="eyebrow">量化系统 / AI Agent / 内容产品 / 基础设施</div>
      <h1 id="page-title">Zhengwen 的可发布项目门户</h1>
      <p class="intro">
        将核心研究、自动化系统、商业内容资产与环境配置统一纳入分层视图。每张卡片都保留项目定位、路径或链接、当前状态与下一步，方便审查、排期和发布。
      </p>
    </div>
    <div class="stats" aria-label="项目统计">
      <div class="stat"><strong id="project-count">0</strong><span>收录项目</span></div>
      <div class="stat"><strong>5</strong><span>S/A/B/C/D 分层</span></div>
      <div class="stat"><strong>4</strong><span>核心方向</span></div>
      <div class="stat"><strong>0</strong><span>本页不触发发布</span></div>
    </div>
  </section>

  <nav class="filters" id="filters" aria-label="项目分层筛选"></nav>
  <section id="portfolio" aria-live="polite"></section>

  <footer class="footer">
    静态门户仅展示项目索引；不包含密钥、业务正文或客户素材内容。
  </footer>
</main>

<script>
const state = { data: null, activeTier: 'ALL' };

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[char]));
}

function makeLink(item) {
  const label = escapeHtml(item.linkLabel || item.path || item.link || '');
  const href = item.link || item.path;
  if (!href) return '<span class="field-value">待补充</span>';
  const isRelative = !/^([a-z]+:)?\/\//i.test(href) && !href.startsWith('/');
  if (isRelative) {
    return `<a class="path-link field-value" href="${escapeHtml(href)}">${label}</a>`;
  }
  return `<span class="field-value">${label}</span>`;
}

function renderFilters(groups) {
  const filters = document.getElementById('filters');
  const buttons = [{ tier: 'ALL', label: '全部' }, ...groups.map(group => ({
    tier: group.tier,
    label: `${group.tier} · ${group.name}`
  }))];
  filters.innerHTML = buttons.map(button => `
    <button class="filter" type="button" data-tier="${escapeHtml(button.tier)}"
      aria-pressed="${button.tier === state.activeTier}">
      ${escapeHtml(button.label)}
    </button>
  `).join('');
  filters.querySelectorAll('button').forEach(button => {
    button.addEventListener('click', () => {
      state.activeTier = button.dataset.tier;
      render();
    });
  });
}

function render() {
  const root = document.getElementById('portfolio');
  const groups = state.data.groups.filter(group =>
    state.activeTier === 'ALL' || group.tier === state.activeTier
  );
  document.getElementById('project-count').textContent =
    state.data.groups.reduce((sum, group) => sum + group.projects.length, 0);
  renderFilters(state.data.groups);
  if (!groups.length) {
    root.innerHTML = '<div class="empty">没有匹配的项目。</div>';
    return;
  }
  root.innerHTML = groups.map(group => `
    <section class="tier" data-tier="${escapeHtml(group.tier)}">
      <div class="tier-head">
        <div class="tier-code">${escapeHtml(group.tier)}</div>
        <div>
          <h2>${escapeHtml(group.name)}</h2>
          <p class="tier-desc">${escapeHtml(group.description)}</p>
        </div>
      </div>
      <div class="grid">
        ${group.projects.map(item => `
          <article class="card">
            <h3>${escapeHtml(item.name)}</h3>
            <p class="positioning">${escapeHtml(item.positioning)}</p>
            <div class="meta">
              <div>
                <span class="field-label">路径 / 链接</span>
                ${makeLink(item)}
              </div>
              <div>
                <span class="field-label">当前状态</span>
                <span class="status">${escapeHtml(item.status)}</span>
              </div>
              <div>
                <span class="field-label">下一步</span>
                <div class="field-value">${escapeHtml(item.nextStep)}</div>
              </div>
            </div>
          </article>
        `).join('')}
      </div>
    </section>
  `).join('');
}

fetch('portfolio-data.json')
  .then(response => {
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  })
  .then(data => {
    state.data = data;
    render();
  })
  .catch(error => {
    document.getElementById('portfolio').innerHTML =
      `<div class="empty">无法读取 portfolio-data.json：${escapeHtml(error.message)}</div>`;
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小葛同学 — 年赚千万直播项目</title>
<style>
:root {
  --bg: #07070d;
  --bg2: #0d0d18;
  --gold: #c8a04a;
  --gold-dim: #6b4d22;
  --gold-glow: rgba(200,160,74,0.08);
  --text: #ccc8be;
  --text-dim: #605c52;
  --accent: #e8c668;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;min-height:100vh}
::selection{background:var(--gold);color:var(--bg)}
a{color:inherit;text-decoration:none}

.page{max-width:760px;margin:0 auto;padding:2rem}

/* Header */
.header{padding:6rem 0 3rem;text-align:center;position:relative}
.header::before{
  content:'';position:absolute;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,var(--gold-glow),transparent 70%);
  top:40%;left:50%;transform:translate(-50%,-50%);
}
.header .brand{
  font-size:.72rem;color:var(--gold-dim);
  letter-spacing:.3em;text-transform:uppercase;
  position:relative;
}
.header h1{
  font-size:clamp(1.5rem,4vw,2.2rem);font-weight:300;
  color:var(--gold);letter-spacing:.1em;
  position:relative;margin-top:.6rem;
}
.header .tagline{
  font-size:.88rem;color:var(--text-dim);
  margin-top:1rem;position:relative;line-height:1.8;
}

/* Divider */
.divider{
  width:40px;height:1px;
  background:var(--gold-dim);
  margin:3rem auto;
}

/* Project list */
.projects{padding:1rem 0}
.projects-label{
  font-size:.68rem;color:var(--text-dim);
  letter-spacing:.25em;text-transform:uppercase;
  margin-bottom:2rem;
}

.project{
  display:block;
  padding:1.8rem 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:padding-left .3s;
}
.project:first-of-type{border-top:1px solid rgba(255,255,255,.04)}
.project:hover{padding-left:1rem}
.project:hover .p-title{color:var(--accent)}

.p-title{
  font-size:1.1rem;color:var(--text);
  font-weight:400;transition:color .2s;
}
.p-desc{
  font-size:.82rem;color:var(--text-dim);
  margin-top:.4rem;line-height:1.7;
}
.p-tags{margin-top:.5rem}
.p-tag{
  display:inline-block;font-size:.6rem;
  padding:.12rem .5rem;border-radius:3px;
  margin-right:.3rem;
  background:rgba(200,160,74,.07);
  color:var(--gold-dim);
  border:1px solid rgba(200,160,74,.08);
}
.p-date{
  font-size:.62rem;color:var(--text-dim);
  margin-top:.4rem;opacity:.4;
}

/* Footer */
.footer{
  text-align:center;padding:4rem 0 2rem;
  font-size:.7rem;color:var(--text-dim);
  opacity:.3;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="brand">小葛同学</div>
    <h1>年赚千万直播项目</h1>
    <div class="tagline">
      用 AI 构建认知系统，用认知系统创造价值
    </div>
  </div>

  <div class="divider"></div>

  <div class="projects">
    <div class="projects-label">Projects</div>
    <div id="project-list"></div>
  </div>

  <div class="footer">小葛同学</div>

</div>

<script>
fetch('published.json')
  .then(r=>r.json())
  .then(items=>{
    const list=document.getElementById('project-list');
    if(!items.length){
      list.innerHTML='<div style="text-align:center;padding:3rem 0;color:#605c52;font-size:.85rem">即将上线</div>';
      return;
    }
    items.forEach(item=>{
      const a=document.createElement('a');
      a.className='project';
      a.href=item.path;
      a.innerHTML=`
        <div class="p-title">${item.title}</div>
        <div class="p-desc">${item.desc}</div>
        <div class="p-tags">${(item.tags||[]).map(t=>`<span class="p-tag">${t}</span>`).join('')}</div>
        <div class="p-date">${item.date||''}</div>
      `;
      list.appendChild(a);
    });
  });
</script>
</body>
</html>

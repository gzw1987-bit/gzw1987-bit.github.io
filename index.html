<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhengwen Ge</title>
<style>
:root {
  --bg: #08080e;
  --bg2: #0e0e1a;
  --gold: #c8a04a;
  --gold-dim: #6b4d22;
  --gold-glow: rgba(200,160,74,0.08);
  --text: #ccc8be;
  --text-dim: #605c52;
  --accent: #e8c668;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;min-height:100vh}
::selection{background:var(--gold);color:var(--bg)}
a{color:var(--gold);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent)}

.page{max-width:760px;margin:0 auto;padding:2rem}

/* Header */
.header{padding:6rem 0 4rem;text-align:center;position:relative}
.header::before{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,var(--gold-glow),transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%)}
.header h1{font-size:1.6rem;font-weight:200;color:var(--gold);letter-spacing:.15em;position:relative}
.header .bio{font-size:.85rem;color:var(--text-dim);margin-top:.8rem;position:relative;line-height:1.8}

/* Works */
.works{padding:2rem 0}
.works-title{font-size:.7rem;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2rem}

.work-item{
  display:block;
  padding:1.5rem 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:padding-left .3s;
}
.work-item:first-child{border-top:1px solid rgba(255,255,255,.04)}
.work-item:hover{padding-left:.8rem}
.work-title{font-size:1.05rem;color:var(--text);transition:color .2s}
.work-item:hover .work-title{color:var(--accent)}
.work-desc{font-size:.8rem;color:var(--text-dim);margin-top:.3rem;line-height:1.6}
.work-meta{font-size:.65rem;color:var(--text-dim);margin-top:.5rem;opacity:.5}
.work-tags{margin-top:.4rem}
.work-tag{
  display:inline-block;font-size:.6rem;
  padding:.1rem .45rem;border-radius:3px;
  margin-right:.3rem;
  background:rgba(200,160,74,.08);color:var(--gold-dim);
  border:1px solid rgba(200,160,74,.1);
}

.empty{
  text-align:center;
  padding:4rem 0;
  color:var(--text-dim);
  font-size:.85rem;
}
.empty .dot{
  display:inline-block;width:6px;height:6px;
  border-radius:50%;background:var(--gold-dim);
  margin:0 .2rem;animation:blink 2s ease-in-out infinite;
}
.empty .dot:nth-child(2){animation-delay:.3s}
.empty .dot:nth-child(3){animation-delay:.6s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

.footer{
  text-align:center;padding:4rem 0 2rem;
  font-size:.7rem;color:var(--text-dim);
  opacity:.4;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>ZHENGWEN GE</h1>
    <div class="bio">
      Quantitative thinker. Yi Jing researcher.<br>
      Building systems that generate insight.
    </div>
  </div>

  <div class="works">
    <div class="works-title">Published Works</div>
    <div id="works-list">
      <div class="empty">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <br>Coming soon
      </div>
    </div>
  </div>

  <div class="footer">Zhengwen Ge</div>

</div>

<script>
fetch('published.json')
  .then(r=>r.json())
  .then(items=>{
    if(!items.length) return;
    const list=document.getElementById('works-list');
    list.innerHTML='';
    items.forEach(item=>{
      const a=document.createElement('a');
      a.className='work-item';
      a.href=item.path;
      a.innerHTML=`
        <div class="work-title">${item.title}</div>
        <div class="work-desc">${item.desc}</div>
        <div class="work-tags">${(item.tags||[]).map(t=>`<span class="work-tag">${t}</span>`).join('')}</div>
        <div class="work-meta">${item.date||''}</div>
      `;
      list.appendChild(a);
    });
  })
  .catch(()=>{});
</script>
</body>
</html>

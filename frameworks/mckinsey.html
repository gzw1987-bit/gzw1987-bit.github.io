<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McKinsey 方法论引擎</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a25;
  --bg4: #0e0e16;
  --gold: #c8a04a;
  --gold-dim: #8b7035;
  --gold-glow: rgba(200,160,74,0.15);
  --gold-bright: #e0bb5f;
  --copper: #b87333;
  --text: #e0ddd5;
  --text-dim: #8a8780;
  --text-muted: #555550;
  --accent: #d4a853;
  --border: #2a2a35;
  --border-light: #353540;
  --red: #c75050;
  --green: #5ab878;
  --blue: #5a8ec7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'SF Pro Text', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}
::selection { background: var(--gold); color: var(--bg); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

/* ===== APP LAYOUT ===== */
.app {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 50;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.12em;
}
.sidebar-header .tagline {
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-top: 0.2rem;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0;
}
.nav-section {
  padding: 0.3rem 1.5rem;
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.8rem;
}
.nav-item {
  padding: 0.55rem 1.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  border-left: 2px solid transparent;
}
.nav-item:hover {
  color: var(--text);
  background: rgba(200,160,74,0.04);
}
.nav-item.active {
  color: var(--gold);
  border-left-color: var(--gold);
  background: rgba(200,160,74,0.06);
}
.nav-icon { font-size: 0.9rem; width: 1.2rem; text-align: center; }

/* History */
.sidebar-history {
  border-top: 1px solid var(--border);
  padding: 1rem 0;
  max-height: 250px;
  overflow-y: auto;
}
.history-item {
  padding: 0.45rem 1.5rem;
  font-size: 0.78rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.history-item:hover { color: var(--text); background: rgba(200,160,74,0.04); }
.history-item .time { font-size: 0.65rem; color: var(--text-muted); margin-right: 0.5rem; }

/* Main */
.main {
  flex: 1;
  margin-left: 280px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Mobile toggle */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 0.8rem; left: 0.8rem;
  z-index: 60;
  width: 36px; height: 36px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--gold);
  font-size: 1.1rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .mobile-toggle { display: flex; }
}

/* ===== VIEWS ===== */
.view { display: none; flex: 1; flex-direction: column; }
.view.active { display: flex; }

/* ===== ANALYZE VIEW ===== */
.analyze-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 2rem;
}
.analyze-header {
  text-align: center;
  padding: 3rem 0 2rem;
}
.analyze-header h2 {
  font-size: 1.6rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.08em;
}
.analyze-header p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.5rem;
}

/* Input area */
.input-area {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.problem-input {
  width: 100%;
  min-height: 100px;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  line-height: 1.7;
  resize: vertical;
  outline: none;
}
.problem-input::placeholder { color: var(--text-muted); }
.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.char-count { font-size: 0.75rem; color: var(--text-muted); }
.btn {
  padding: 0.6rem 1.8rem;
  border-radius: 8px;
  border: 1px solid var(--gold);
  background: rgba(200,160,74,0.1);
  color: var(--gold);
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
.btn:hover { background: rgba(200,160,74,0.2); box-shadow: 0 0 20px var(--gold-glow); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn-primary {
  background: var(--gold);
  color: var(--bg);
  font-weight: 500;
}
.btn-primary:hover { background: var(--gold-bright); }
.btn-sm { padding: 0.4rem 1rem; font-size: 0.8rem; }
.btn-ghost { border-color: var(--border); background: transparent; color: var(--text-dim); }
.btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); background: rgba(200,160,74,0.05); }

/* Steps progress */
.steps-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-bottom: 2rem;
}
.step-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.step-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  transition: all 0.4s;
}
.step-dot.active { border-color: var(--gold); color: var(--gold); }
.step-dot.done { border-color: var(--green); color: var(--green); background: rgba(90,184,120,0.1); }
.step-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  transition: color 0.3s;
}
.step-indicator.active .step-label { color: var(--gold); }
.step-indicator.done .step-label { color: var(--green); }
.step-connector {
  width: 50px;
  height: 1px;
  background: var(--border);
  align-self: center;
  margin: 0 0.5rem;
  position: relative;
  top: -8px;
}
.step-connector.done { background: var(--green); }

/* Result panels */
.result-section {
  margin-bottom: 1.5rem;
  animation: slideUp 0.4s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.panel-header {
  padding: 1rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.panel-header h3 {
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.panel-header .badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  background: rgba(200,160,74,0.1);
  color: var(--gold);
  border: 1px solid rgba(200,160,74,0.2);
}
.panel-body { padding: 1.5rem; }

/* Category result */
.cat-result {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem 1rem;
  background: var(--bg3);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  transition: all 0.3s;
}
.cat-result.matched {
  background: rgba(200,160,74,0.08);
  border: 1px solid rgba(200,160,74,0.2);
}
.cat-result .cat-name {
  font-size: 0.9rem;
  color: var(--text);
  min-width: 80px;
}
.cat-result.matched .cat-name { color: var(--gold); }
.confidence-bar {
  flex: 1;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden;
}
.confidence-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.6s ease;
}
.confidence-val {
  font-size: 0.75rem;
  color: var(--text-dim);
  min-width: 36px;
  text-align: right;
}

/* Framework cards in result */
.fw-result-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem 1.5rem;
  margin-bottom: 0.8rem;
}
.fw-result-card h4 {
  color: var(--gold);
  font-weight: 400;
  font-size: 0.95rem;
  margin-bottom: 0.3rem;
}
.fw-result-card .why {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
}
.fw-result-card .fw-detail {
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.8;
}
.fw-result-card .fw-detail strong { color: var(--text); font-weight: 500; }
.fw-result-card .fw-detail ul { list-style: none; padding: 0; }
.fw-result-card .fw-detail li { padding-left: 1.2rem; position: relative; margin-bottom: 0.2rem; }
.fw-result-card .fw-detail li::before { content: '›'; position: absolute; left: 0; color: var(--gold-dim); }

/* Editable template */
.template-output {
  background: var(--bg4);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-top: 0.5rem;
}
.template-row {
  display: flex;
  align-items: flex-start;
  margin-bottom: 0.6rem;
  gap: 0.5rem;
}
.template-label {
  color: var(--gold);
  font-size: 0.85rem;
  font-family: 'SF Mono', 'Fira Code', monospace;
  min-width: fit-content;
  white-space: nowrap;
  padding-top: 0.3rem;
}
.template-field {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 0.88rem;
  font-family: inherit;
  padding: 0.3rem 0.3rem;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.6;
}
.template-field:focus { border-bottom-color: var(--gold-dim); }
.template-field::placeholder { color: var(--text-muted); font-style: italic; }
.template-field-multi {
  width: 100%;
  min-height: 60px;
  background: rgba(200,160,74,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.85rem;
  font-family: inherit;
  padding: 0.6rem;
  outline: none;
  resize: vertical;
  line-height: 1.7;
  margin-top: 0.3rem;
}
.template-field-multi:focus { border-color: var(--gold-dim); }
.template-field-multi::placeholder { color: var(--text-muted); font-style: italic; }
.tree-display {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82rem;
  line-height: 1.7;
  white-space: pre;
  color: var(--text-dim);
  padding: 1rem;
  background: var(--bg);
  border-radius: 8px;
  margin: 0.5rem 0;
  overflow-x: auto;
}
.tree-display .hl { color: var(--gold); }
.template-separator {
  height: 1px;
  background: var(--border);
  margin: 1rem 0;
}
.template-section-title {
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 1rem 0 0.5rem;
}

/* Action bar */
.action-bar {
  display: flex;
  gap: 0.8rem;
  margin-top: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* Export modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 {
  color: var(--gold);
  font-weight: 400;
  margin-bottom: 1rem;
}
.modal pre {
  background: var(--bg);
  padding: 1.2rem;
  border-radius: 8px;
  font-size: 0.82rem;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text-dim);
  max-height: 50vh;
  overflow-y: auto;
}
.modal-actions {
  display: flex;
  gap: 0.8rem;
  margin-top: 1.5rem;
  justify-content: flex-end;
}

/* ===== REFERENCE VIEW ===== */
.ref-container {
  max-width: 1000px;
  width: 100%;
  margin: 0 auto;
  padding: 2rem;
}
.ref-container h2 {
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.08em;
  margin-bottom: 0.3rem;
}
.ref-container .subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 2rem;
}

/* Ref tabs */
.ref-tabs {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}
.ref-tab {
  padding: 0.45rem 1rem;
  font-size: 0.82rem;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
}
.ref-tab:hover { color: var(--text); background: rgba(200,160,74,0.05); }
.ref-tab.active { color: var(--gold); background: rgba(200,160,74,0.08); }

.ref-content { animation: slideUp 0.3s ease; }
.fw-ref-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 1rem;
  overflow: hidden;
}
.fw-ref-header {
  padding: 1rem 1.5rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s;
}
.fw-ref-header:hover { background: rgba(200,160,74,0.03); }
.fw-ref-header h4 { font-weight: 400; color: var(--text); font-size: 0.95rem; }
.fw-ref-header .tag {
  font-size: 0.72rem;
  color: var(--gold);
  background: rgba(200,160,74,0.1);
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  margin-left: 0.6rem;
}
.fw-ref-header .toggle { color: var(--gold-dim); transition: transform 0.3s; }
.fw-ref-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.fw-ref-card.open .fw-ref-body { max-height: 2000px; }
.fw-ref-card.open .toggle { transform: rotate(45deg); }
.fw-ref-content {
  padding: 0 1.5rem 1.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
  line-height: 1.8;
}
.fw-ref-content strong { color: var(--text); font-weight: 500; }
.fw-ref-content ul { list-style: none; padding: 0; }
.fw-ref-content li { padding-left: 1.2rem; position: relative; margin-bottom: 0.2rem; }
.fw-ref-content li::before { content: '›'; position: absolute; left: 0; color: var(--gold-dim); }
.fw-ref-content .essence {
  color: var(--gold);
  font-size: 0.92rem;
  margin-bottom: 0.8rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
}
.fw-ref-content .tree {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem;
  background: var(--bg);
  padding: 1rem;
  border-radius: 8px;
  margin: 0.5rem 0;
  line-height: 1.6;
  overflow-x: auto;
  white-space: pre;
}
.fw-ref-content .tree .hl { color: var(--gold); }

/* Principles grid */
.principles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.principle-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.3rem;
  transition: all 0.3s;
}
.principle-card:hover { border-color: var(--gold-dim); box-shadow: 0 0 20px var(--gold-glow); }
.principle-card .num { color: var(--gold); font-size: 1.8rem; font-weight: 200; line-height: 1; margin-bottom: 0.4rem; }
.principle-card h4 { font-weight: 400; color: var(--text); font-size: 0.9rem; margin-bottom: 0.3rem; }
.principle-card p { color: var(--text-dim); font-size: 0.8rem; }

/* Decision tree */
.dt-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
}
.dt-branch { margin-bottom: 0.5rem; }
.dt-question {
  padding: 0.5rem 0.8rem;
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.dt-question:hover { background: rgba(200,160,74,0.06); }
.dt-question::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1px solid var(--gold-dim);
  flex-shrink: 0;
}
.dt-leaves {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  margin-left: 2rem;
}
.dt-leaves.open { max-height: 500px; }
.dt-leaf {
  padding: 0.35rem 0;
  font-size: 0.83rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.dt-leaf .problem { color: var(--text-dim); }
.dt-leaf .arrow { color: var(--gold-dim); }
.dt-leaf .result {
  color: var(--gold);
  background: rgba(200,160,74,0.08);
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.78rem;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg3);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 0.7rem 1.5rem;
  border-radius: 8px;
  font-size: 0.85rem;
  z-index: 300;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Typing animation */
@keyframes typing {
  0% { opacity: 0.3; }
  50% { opacity: 1; }
  100% { opacity: 0.3; }
}
.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  margin: 0 2px;
  animation: typing 1s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1rem 1.5rem;
  color: var(--text-dim);
  font-size: 0.85rem;
}
</style>
</head>
<body>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>McKinsey</h1>
      <div class="tagline">结构化思维引擎</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">工具</div>
      <div class="nav-item active" data-view="analyze">
        <span class="nav-icon">◈</span> 问题分析
      </div>
      <div class="nav-section">参考</div>
      <div class="nav-item" data-view="frameworks">
        <span class="nav-icon">◇</span> 12 框架
      </div>
      <div class="nav-item" data-view="principles">
        <span class="nav-icon">△</span> 六大铁律
      </div>
      <div class="nav-item" data-view="decision-tree">
        <span class="nav-icon">▽</span> 决策树
      </div>
    </nav>
    <div class="sidebar-history">
      <div class="nav-section">历史记录</div>
      <div id="historyList"></div>

    e.preventDefault();

function runAnalysis() {
  const problem = problemInput.value.trim();
  if (!problem) return;

  analyzeBtn.disabled = true;
  resultsArea.innerHTML = '';
  updateSteps(1, 'done');

  // Step 1: Classify
  setTimeout(() => {
    updateSteps(2, 'active');
    const scores = classifyProblem(problem);
    const matched = scores.filter(s => s.score > 0);
    renderClassification(scores, matched);

    // Step 2: Match frameworks
    setTimeout(() => {
      updateSteps(2, 'done');
      updateSteps(3, 'active');
      const selectedFrameworks = selectFrameworks(matched);
      renderFrameworks(selectedFrameworks, problem);

      // Step 3: Generate template
      setTimeout(() => {
        updateSteps(3, 'done');
        const primaryType = matched.length > 0 ? matched[0].cat.outputType : 'diagnose';
        renderTemplate(primaryType, problem, selectedFrameworks);
        renderActions(problem, matched, selectedFrameworks, primaryType);

        // Save history
        saveHistory(problem, matched);
      }, 400);
    }, 500);
  }, 300);
}

function classifyProblem(text) {
  const lower = text.toLowerCase();
  return categories.map(cat => {
    let score = 0;
    let matchedKw = [];
    cat.keywords.forEach(kw => {
      if (lower.includes(kw.toLowerCase())) {
        score += kw.length; // longer keyword = more specific = higher weight
        matchedKw.push(kw);
      }
    });
    return { cat, score, matchedKw, pct: 0 };
  }).sort((a, b) => b.score - a.score).map((item, i, arr) => {
    const maxScore = arr[0].score || 1;
    item.pct = maxScore > 0 ? Math.round((item.score / maxScore) * 100) : 0;
    return item;
  });
}

function selectFrameworks(matched) {
  if (matched.length === 0) {
    return [{ name:'问题树', ...frameworkDetails['问题树'] }, { name:'假设驱动', ...frameworkDetails['假设驱动'] }];
  }
  const seen = new Set();
  const result = [];
  matched.forEach(m => {
    m.cat.frameworks.forEach(fw => {
      if (!seen.has(fw) && result.length < 3) {
        seen.add(fw);
        const detail = frameworkDetails[fw] || { tag:'', essence:fw, detail:'' };
        result.push({ name: fw, ...detail });
      }
    });
  });
  return result.slice(0, 3);
}

    <div class="panel-header"><h3>◈ 问题分类 <span class="badge">Step 1</span></h3></div>
    <div class="panel-body">`;
  scores.forEach(s => {
    const isMatched = s.score > 0;
    html += `<div class="cat-result ${isMatched ? 'matched' : ''}">
      <span class="cat-name">${s.cat.name}</span>
      <div class="confidence-bar"><div class="confidence-fill" style="width:${s.pct}%"></div></div>
      <span class="confidence-val">${s.pct}%</span>
    </div>`;
  });
  if (matched.length > 0) {
    html += `<div style="margin-top:1rem;font-size:0.82rem;color:var(--text-dim);">
      匹配关键词：${matched.map(m => m.matchedKw.map(k => `<span style="color:var(--gold)">${k}</span>`).join(' ')).join(' · ')}
    </div>`;
  } else {
    html += `<div style="margin-top:1rem;font-size:0.82rem;color:var(--text-dim);">
      未匹配到特定类别，将使用通用分析框架（问题树 + 假设驱动）
    </div>`;
  }
  html += `</div></div></div>`;
  resultsArea.innerHTML += html;
}

function updateSteps(step, state) {
  document.querySelectorAll('.step-indicator').forEach(si => {
    const s = parseInt(si.dataset.step);
    const dot = si.querySelector('.step-dot');
    if (s < step || (s === step && state === 'done')) {
      si.className = 'step-indicator done';
      dot.className = 'step-dot done';
      dot.textContent = '✓';
    } else if (s === step && state === 'active') {
      si.className = 'step-indicator active';
      dot.className = 'step-dot active';
      dot.textContent = s;
    }
  });
  document.querySelectorAll('.step-connector').forEach((c, i) => {
    c.className = 'step-connector' + (i + 1 < step || (i + 1 === step && state === 'done') ? ' done' : '');
  });
}

function resetAnalysis() {
  resultsArea.innerHTML = '';
  problemInput.value = '';
  problemInput.dispatchEvent(new Event('input'));
  document.querySelectorAll('.step-indicator').forEach((si, i) => {
    si.className = 'step-indicator' + (i === 0 ? ' active' : '');
    const dot = si.querySelector('.step-dot');
    dot.className = 'step-dot' + (i === 0 ? ' active' : '');
    dot.textContent = i + 1;
  });
  document.querySelectorAll('.step-connector').forEach(c => c.className = 'step-connector');
  problemInput.focus();
}

function exportAnalysis() {
  const tmpl = document.getElementById('templateOutput');
  if (!tmpl) return;
  let md = '# McKinsey 分析结果\n\n';
  tmpl.querySelectorAll('.template-section-title').forEach(st => {
    md += `## ${st.textContent}\n\n`;
    let next = st.nextElementSibling;
    while (next && !next.classList.contains('template-section-title') && !next.classList.contains('template-separator')) {
      if (next.classList.contains('template-row')) {
        const label = next.querySelector('.template-label');
        const fields = next.querySelectorAll('.template-field');
        if (label) md += label.textContent;
        fields.forEach(f => md += (f.value || f.placeholder));
        md += '\n';
      }
      if (next.classList.contains('template-field-multi')) {
        md += (next.value || next.placeholder) + '\n';
      }
      next = next.nextElementSibling;
    }
    md += '\n';
  });
  document.getElementById('exportContent').textContent = md;
  document.getElementById('exportModal').classList.add('show');
}

function copyExport() {
  const text = document.getElementById('exportContent').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function saveHistory(problem, matched) {
  const entry = {
    problem: problem.slice(0, 50),
    categories: matched.map(m => m.cat.name),
    time: new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }),
    date: new Date().toLocaleDateString('zh-CN')
  };
  analysisHistory.unshift(entry);
  if (analysisHistory.length > 20) analysisHistory = analysisHistory.slice(0, 20);
  localStorage.setItem('mckinsey_history', JSON.stringify(analysisHistory));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  el.innerHTML = analysisHistory.map(h =>
    `<div class="history-item" title="${escHtml(h.problem)}"><span class="time">${h.time}</span>${escHtml(h.problem)}</div>`
  ).join('');
}

// ===== FRAMEWORKS REFERENCE VIEW =====
const refCats = ['全部', ...new Set(frameworksRef.map(f => f.cat))];
let activeRefCat = '全部';

function renderRefTabs() {
  const el = document.getElementById('fwRefTabs');
  el.innerHTML = refCats.map(c =>
    `<div class="ref-tab ${c === activeRefCat ? 'active' : ''}" data-cat="${c}">${c}</div>`
  ).join('');
  el.querySelectorAll('.ref-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeRefCat = tab.dataset.cat;
      renderRefTabs();
      renderRefContent();
    });
  });
}

function renderRefContent() {
  const el = document.getElementById('fwRefContent');
  const filtered = activeRefCat === '全部' ? frameworksRef : frameworksRef.filter(f => f.cat === activeRefCat);
  el.innerHTML = filtered.map(fw => `
    <div class="fw-ref-card">
      <div class="fw-ref-header" onclick="this.parentElement.classList.toggle('open')">
        <div><h4>${fw.name}</h4><span class="tag">${fw.tag}</span></div>
        <span class="toggle">+</span>

      <div class="fw-ref-body"><div class="fw-ref-content">
        <div class="essence">${fw.essence}</div>

    </div>

}

renderRefContent();

  </div>
`).join('');

// ===== UTILS =====
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
